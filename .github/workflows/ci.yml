name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62

      - name: install tygo
        run: go install github.com/gzuidhof/tygo@latest

      - name: tygo drift check (make check-types)
        run: make check-types

      - name: go test (race)
        run: go test ./... -race

      - name: ui install
        run: npm --prefix ui ci

      - name: ui build
        run: npm --prefix ui run build

      - uses: docker/setup-buildx-action@v3

      # docker/metadata-action runs for tag-shape validation only; no actual push
      # happens from ci.yml (publish.yml owns the push). Producing the three-tag
      # output here catches tag-grammar regressions on every PR before they reach
      # the publish path.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/centroid-is/docker-update
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: hmi-update:ci
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: image-size gate (<30 MB)
        run: |
          set -e
          SIZE=$(docker image inspect --format '{{.Size}}' hmi-update:ci)
          echo "[image-size] hmi-update:ci size=$SIZE bytes (budget=30000000)"
          if [ "$SIZE" -gt 30000000 ]; then
            echo "FAIL: image hmi-update:ci is $SIZE bytes (over 30000000 byte budget)" >&2
            exit 1
          fi
          echo "OK: image within 30 MB budget"

      - name: install oras
        run: |
          curl -L https://github.com/oras-project/oras/releases/latest/download/oras_linux_amd64.tar.gz | tar -xz oras
          sudo mv oras /usr/local/bin/

      - name: install playwright browsers
        run: |
          cd e2e
          npm ci
          npx playwright install --with-deps chromium

      - name: e2e (cron-fast)
        run: make e2e-cron-fast

      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
