# docker-compose.example.yml — reference deployment for docker-update
#
# Copy this file to your HMI host (typically /opt/centroid/docker-compose.yml),
# then follow README.md §Installation on an HMI:
#
#   1. HOST_DOCKER_GID=$(id -g docker)
#   2. Replace <docker-gid> in the `user:` line below with that value
#   3. Adjust the three bind-mount source paths to match your HMI layout
#      (the defaults assume /opt/centroid/* — change if you keep state
#      elsewhere)
#   4. sudo touch /opt/centroid/docker_update_state.json
#      sudo chown 65532:65532 /opt/centroid/docker_update_state.json
#   5. cd /opt/centroid && docker compose up -d docker-update
#
# Tested on Debian 12 with Docker Engine v29+ and the docker-compose-plugin.
# See README.md §Installation on an HMI for the full runbook.
# See .planning/PROJECT.md §Manual self-upgrade procedure for the upgrade dance.

services:
  docker-update:
    image: ghcr.io/centroid-is/docker-update:latest
    container_name: docker-update
    restart: unless-stopped
    ports:
      - "8080:8080"

    # 65532 = distroless nonroot UID (pre-created inside the image).
    # <docker-gid> = `id -g docker` on the host (see step 1 above).
    # Required so the container can read /var/run/docker.sock.
    # See PROJECT.md §Installation prerequisites and Pitfall 9.
    user: "65532:<docker-gid>"

    volumes:
      # --- three core bind-mounts (brief §F7) ---

      # Docker socket — daemon-side facade for inspect / events / pull
      # AND (since Phase 9 (a)) the SOLE host-side dependency for the
      # recreate path. internal/recreate.Service composes Stop / Remove /
      # Create / Start daemon calls through this socket — no docker CLI
      # subprocess is involved.
      - /var/run/docker.sock:/var/run/docker.sock

      # Compose file — read-only source-of-truth for compose.Reader's
      # boot-time drift detection (catches operators editing
      # docker-compose.yml between docker-update restarts; surfaces 412
      # on the next Update action). NEVER mutated by docker-update;
      # compose-file rewriting is explicitly out of scope per PROJECT.md.
      - /opt/centroid/docker-compose.yml:/host/docker-compose.yml:ro

      # State file — bind-mounted, persists across container recreate.
      # MUST be chowned to 65532:65532 before first start (see step 4 above).
      - /opt/centroid/docker_update_state.json:/state/docker_update_state.json

      # --- Phase 9 (a): no CLI-delivery bind-mounts ---
      # Pre-Phase-9 docker-update shelled out to a host docker-CLI
      # subprocess for compose recreates. Phase 9 (a) replaced that with
      # a socket-only recreate primitive (internal/recreate.Service)
      # consuming the docker socket bind-mounted above directly. The
      # host-binary bind-mounts that previously appeared here are no
      # longer needed and have been REMOVED.
      #
      # If you are UPGRADING an existing HMI from a pre-Phase-9 install,
      # delete the two pre-existing `:ro` mounts for the host docker
      # binary and its cli-plugins directory from your installed compose
      # file before pulling the new image.

    environment:
      # Cron schedule for the digest poll (5-field expression).
      # Default is hourly on the hour; set to e.g. "*/15 * * * *" for
      # every 15 minutes, or "@every 5s" for testing (NOT production).
      DOCKER_UPDATE_CRON: "0 * * * *"

      # Inside-container path to the compose file (matches the :ro
      # bind-mount above; do not change without updating that line).
      DOCKER_UPDATE_COMPOSE_PATH: "/host/docker-compose.yml"

      # Inside-container path to the state file (matches the bind-mount
      # above; do not change without updating that line).
      DOCKER_UPDATE_STATE_PATH: "/state/docker_update_state.json"

      # See PROJECT.md §Configuration knobs for the full env-var list.
      # The three above are the minimum set for a production HMI install.

    # NOTE: label KEYS are intentionally namespaced "hmi-update.*" for
    # backwards-compat across the HMI fleet. This is a deliberate carve-out
    # — the binary, image, and service name are now "docker-update" but the
    # watched-container label contract stays on the old prefix. See
    # CLAUDE.md and README.md "Backwards-compatible label namespace".
    labels:
      # Self-protection display hint: keep docker-update OUT of the watched-
      # containers table in its own UI. Server-side, ACT-09 enforces this
      # via a 409 self-protection error regardless of this label — the
      # label is purely a UI-display convenience.
      hmi-update.watch: "false"

    # No healthcheck: the distroless image has no wget/curl/shell to drive
    # a probe. Operators can verify health via `curl http://localhost:8080/healthz`
    # from the HMI host shell. A self-probe flag is tracked as deferred
    # item D-07-04.

# NOTE: docker-update is designed to live ALONGSIDE your existing compose
# services in the same docker-compose.yml (or a multi-file compose
# invocation). This example file shows ONLY the docker-update service block —
# merge it into your existing `/opt/centroid/docker-compose.yml` rather
# than running it standalone.
