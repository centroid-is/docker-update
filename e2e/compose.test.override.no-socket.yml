# ============================================================================
# compose.test.override.no-socket.yml
#
# PURPOSE
#   Drives /healthz into the `healthzBodySocketMissing` branch by pointing
#   HMI_UPDATE_DOCKER_HOST at a path that does not exist inside the
#   container. This is more robust than trying to remove the socket
#   bind-mount from compose.test.yml — compose v2 APPENDS volumes from
#   overrides; there is no clean way to *delete* a specific volume entry,
#   only to add more.
#
#   The /healthz handler reads dockerSocketPath() (in internal/api/handlers.go)
#   which honours HMI_UPDATE_DOCKER_HOST. Pointing it at
#   /var/run/does-not-exist.sock makes os.Stat return fs.ErrNotExist and
#   the handler emits the "docker socket missing" body verbatim.
#
# USAGE
#   docker compose -f e2e/compose.test.yml -f e2e/compose.test.override.no-socket.yml up -d
#
# NOTE
#   This means the socket IS still bind-mounted; the test only proves the
#   "operator did not configure the bind-mount" branch of /healthz, not
#   the actual missing-mount filesystem case. For Phase 2 acceptance the
#   handler-level branch coverage is what matters; the operator's
#   real-world failure (missing bind-mount) is the same code path because
#   handlers.go's os.Stat returns fs.ErrNotExist either way — the only
#   difference is whether the path /var/run/docker.sock exists on the
#   host's bind-mount source.
#
#   ALSO: we override docker.NewClient's daemon endpoint by setting
#   DOCKER_HOST to the same missing-socket path. docker.NewClient is
#   constructed with client.FromEnv which reads DOCKER_HOST, so the
#   constructor itself does not fail-fast (it lazy-dials on first
#   request); but the /healthz handler's Ping would also fail — that path
#   is masked by the earlier os.Stat fail.
#
# MERGE BEHAVIOUR
#   Compose v2 APPENDS the environment array. The base
#   HMI_UPDATE_STATE_PATH + HMI_UPDATE_LOG_LEVEL + HMI_UPDATE_COMPOSE_PATH
#   entries are preserved; this override adds two more entries.
# ============================================================================

services:
  hmi-update:
    environment:
      # Points handlers.go's dockerSocketPath() at a path that os.Stat
      # will fail with fs.ErrNotExist on — the healthz handler routes
      # that to healthzBodySocketMissing.
      - HMI_UPDATE_DOCKER_HOST=/var/run/does-not-exist.sock
      # Belt-and-braces: also point the moby SDK's DOCKER_HOST at the
      # same missing path so docker.NewClient.FromEnv + lazy-dial fails
      # consistently. The unix:// prefix is the SDK's expected form for
      # a socket address.
      - DOCKER_HOST=unix:///var/run/does-not-exist.sock
