services:
  zot:
    image: ghcr.io/project-zot/zot-linux-amd64:latest
    ports:
      # Host-side 15000 -> container-side 5000. We intentionally avoid the
      # default host port 5000 because macOS Control Center (AirPlay
      # Receiver) binds 5000 by default — that conflict is silent on
      # `docker compose up --wait` and surfaces as a "address already in
      # use" error. The hmi-update container still reaches zot at
      # `zot:5000` over the compose-internal network; only the host-side
      # oras push uses 15000.
      - "15000:5000"
    volumes:
      - ./zot-config.json:/etc/zot/config.json:ro
    command: ["serve", "/etc/zot/config.json"]
    # NOTE: no compose-side healthcheck. The zot image is itself
    # distroless-style — no wget, no curl, no shell — so the canonical
    # `wget --spider http://localhost:5000/v2/` probe documented in
    # RESEARCH.md fails with "executable file not found in $PATH" and the
    # container stays Unhealthy forever, blocking `up -d --wait`.
    # Instead, global-setup.ts polls http://localhost:15000/v2/ from the
    # host before the first oras push; that's the gate that confirms zot
    # is ready in this phase.

  stub-watched-container:
    image: busybox:latest
    command: ["sh", "-c", "while true; do sleep 30; done"]
    labels:
      hmi-update.watch: "true"
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 3

  # DETECT-08 fixture: a container labeled with
  # hmi-update.tag-pattern=^latest-pg17$ whose `image:` references a
  # tag that matches the pattern. detect-tag-pattern.spec.ts pushes
  # to :latest-pg18-oss (must NOT flip update_available) and to
  # :latest-pg17 (MUST flip).
  #
  # IMAGE PROVENANCE: this image does NOT exist in any public
  # registry. The e2e global-setup pre-seeds the local docker
  # daemon's cache via `docker tag busybox:latest
  # timescale/timescaledb-stub:latest-pg17` BEFORE `docker compose
  # up`, then pushes a corresponding manifest into zot via
  # pushFreshManifest('timescale/timescaledb', { tag: 'latest-pg17' })
  # so the cronPoller has a digest to fetch.
  #
  # pull_policy: never blocks docker from trying to fetch the image
  # from any registry — the local re-tagged copy is the only source.
  # Without this, compose would attempt a docker pull against
  # docker.io which would fail because the image doesn't exist
  # publicly.
  timescaledb-stub:
    image: timescale/timescaledb-stub:latest-pg17
    pull_policy: never
    command: ["sleep", "infinity"]
    labels:
      hmi-update.watch: "true"
      hmi-update.tag-pattern: "^latest-pg17$"
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 3

  # DETECT-08 fixture (invalid-regex branch): a container whose
  # tag-pattern label fails regexp.Compile. The Discoverer's
  # patterns.Set surfaces this via a follow-on StateUpdate that sets
  # Container.Notes to the noteInvalidTagPattern const ("invalid
  # tag-pattern label, ignored"). detect-tag-pattern.spec.ts test 3
  # polls /api/state for that exact Notes string.
  #
  # `[unclosed(` is a syntactically broken regex (unbalanced bracket
  # AND unbalanced paren) — RE2's parser rejects it with a clean
  # error; the Discoverer's permissive-on-error path takes over.
  invalid-pattern-stub:
    image: busybox:latest
    command: ["sleep", "infinity"]
    labels:
      hmi-update.watch: "true"
      hmi-update.tag-pattern: "[unclosed("
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 3

  # DETECT-09 fixture: a digest-pinned container. The Discoverer's
  # parseImageRef detects `image: ...@sha256:...` and sets
  # state.Container.Pinned = true; the cronPoller skips pinned
  # containers; Container.Notes is "pinned: opt-out".
  # detect-pinned.spec.ts asserts both the appears-pinned shape and
  # the never-flips invariant.
  #
  # The sha256 below is the current busybox:latest amd64 digest
  # captured locally at plan-execution time
  # (`docker inspect busybox | jq -r '.[0].RepoDigests[0]'`). If the
  # busybox tag rotates and the digest goes stale, refresh via the
  # same one-liner — the digest is not part of the spec under test,
  # it just needs to be a resolvable busybox digest so docker can
  # actually start the container.
  pinned-stub:
    image: busybox@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    command: ["sleep", "infinity"]
    labels:
      hmi-update.watch: "true"
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 3

  # NOTE: hmi-update intentionally has NO compose-side healthcheck.
  # The runtime image (gcr.io/distroless/static-debian12:nonroot) lacks
  # wget, curl, and any shell, so there's nothing to drive a probe with.
  # e2e/global-setup.ts polls http://localhost:8080/healthz from the host
  # after `docker compose up -d --wait` returns; that is the gate we use
  # to know hmi-update is serving. Phase 7 may revisit by either baking a
  # --healthcheck flag into the binary or switching to cc-debian12.
  hmi-update:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    # macOS Docker Desktop + Linux dual support. The container's effective
    # UID stays at 65532 (distroless nonroot reserved). The GID is overridden
    # at compose-up time from HMI_DOCKER_GID, which the Makefile derives from
    # `stat`-ing /var/run/docker.sock on the host (see Makefile `e2e` target).
    # Fallback to 65532 keeps explicit failure visible when the env var is
    # unset: /healthz will return 503 EACCES with the Pitfall 9 hint, the
    # same way the compose.test.override.eacces.yml override does
    # deliberately. Override files that pin a literal user: (e.g.
    # compose.test.override.eacces.yml's "65532:65532") bypass this base
    # entry — compose v2 scalar-merge replaces the whole string.
    user: "65532:${HMI_DOCKER_GID:-65532}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./compose.test.yml:/host/docker-compose.yml:ro
    tmpfs:
      # tmpfs (not a named volume) for the state dir so the nonroot UID
      # 65532 can write to it. Named volumes inherit root ownership on
      # first create and there's no shell in distroless to chown them.
      # tmpfs sizes/mounts are owned by the container user from the start.
      # Phase 1 tests don't need state durability between runs (teardown
      # wipes everything); Phase 7 may revisit when production durability
      # is in scope.
      - /state:uid=65532,gid=65532,mode=0755
    environment:
      - HMI_UPDATE_STATE_PATH=/state/hmi_update_state.json
      - HMI_UPDATE_LOG_LEVEL=info
      # HMI_UPDATE_COMPOSE_PATH — Phase 2 (DOCK-02). main.go's
      # compose.NewReader call log.Fatalf's on empty path; the bind-mount
      # below provides the file at /host/docker-compose.yml.
      - HMI_UPDATE_COMPOSE_PATH=/host/docker-compose.yml
    depends_on:
      # service_started (not service_healthy) because zot has no
      # compose-side healthcheck — see the note on the zot service above.
      # global-setup.ts polls /v2/ from the host before any test runs, so
      # the readiness gate is preserved at a different layer.
      zot:
        condition: service_started
      stub-watched-container:
        condition: service_started
      # Plan 03-05 fixtures (DETECT-08 + DETECT-09). All three new
      # containers must be visible to hmi-update's Discoverer at
      # boot, so they're hard depends_on entries here.
      timescaledb-stub:
        condition: service_started
      invalid-pattern-stub:
        condition: service_started
      pinned-stub:
        condition: service_started

# No named volumes needed: hmi-update writes its state into a tmpfs
# (see above) which is wiped along with the container on `docker compose
# down`. The Phase 7 production deployment will bind-mount a host path
# instead per DEPLOY-04.
