services:
  zot:
    image: ghcr.io/project-zot/zot-linux-amd64:latest
    ports:
      # Host-side 15000 -> container-side 5000. We intentionally avoid the
      # default host port 5000 because macOS Control Center (AirPlay
      # Receiver) binds 5000 by default — that conflict is silent on
      # `docker compose up --wait` and surfaces as a "address already in
      # use" error. The docker-update container still reaches zot at
      # `zot:5000` over the compose-internal network; only the host-side
      # oras push uses 15000.
      - "15000:5000"
    volumes:
      - ./zot-config.json:/etc/zot/config.json:ro
    command: ["serve", "/etc/zot/config.json"]
    # NOTE: no compose-side healthcheck. The zot image is itself
    # distroless-style — no wget, no curl, no shell — so the canonical
    # `wget --spider http://localhost:5000/v2/` probe documented in
    # RESEARCH.md fails with "executable file not found in $PATH" and the
    # container stays Unhealthy forever, blocking `up -d --wait`.
    # Instead, global-setup.ts polls http://localhost:15000/v2/ from the
    # host before the first oras push; that's the gate that confirms zot
    # is ready in this phase.

  # IMAGE PROVENANCE
  #   This image MUST be locally pre-cached under the exact tag
  #   `zot:5000/centroid-is/stub:latest` BEFORE `docker compose up`
  #   because pull_policy: never forbids any network fetch.
  #
  #   The Makefile e2e* targets (and e2e/global-setup.ts as a backup
  #   when invoked directly) run:
  #     docker pull busybox:latest
  #     docker tag busybox:latest zot:5000/centroid-is/stub:latest
  #
  #   Why prefix the image with `zot:5000/...`: when docker-update's
  #   internal/registry.Resolver calls crane.Digest on c.Image + ":"
  #   + c.Tag, the resulting URL is "zot:5000/centroid-is/stub:latest"
  #   which the compose-internal network resolves to the in-cluster
  #   zot service (NOT docker.io). Plan 03-05's e2e tests push fresh
  #   manifests to localhost:15000/centroid-is/stub:latest (the same
  #   underlying repo via the host port mapping); the resolver inside
  #   docker-update sees those same digests via the in-cluster zot:5000
  #   route. The push and the fetch land on the same registry
  #   instance, just via different network paths.
  stub-watched-container:
    image: zot:5000/centroid-is/stub:latest
    pull_policy: never
    command: ["sh", "-c", "while true; do sleep 30; done"]
    labels:
      hmi-update.watch: "true"
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 3

  # DETECT-08 fixture: a container labeled with
  # hmi-update.tag-pattern=^latest-pg17$ whose `image:` references a
  # tag that matches the pattern. detect-tag-pattern.spec.ts pushes
  # to :latest-pg18-oss (must NOT flip update_available) and to
  # :latest-pg17 (MUST flip).
  #
  # IMAGE PROVENANCE: same docker-tag pre-seed trick as
  # stub-watched-container — the local daemon's image cache is
  # primed with this exact tag before `compose up`:
  #   docker pull busybox:latest
  #   docker tag busybox:latest zot:5000/timescale/timescaledb:latest-pg17
  #
  # The `zot:5000/` prefix routes the resolver's crane.Digest call
  # at the in-cluster zot service. Plan 03-05's detect-tag-pattern
  # spec pushes fresh manifests to
  # localhost:15000/timescale/timescaledb:{latest-pg17,latest-pg18-oss}
  # (same repo via the host port); the resolver inside docker-update
  # sees them via zot:5000/timescale/timescaledb:latest-pg17.
  #
  # pull_policy: never blocks docker from trying to fetch the image
  # from any registry — the local re-tagged copy is the only source.
  # Without this, compose would attempt a docker pull against
  # zot:5000 (which the HOST daemon can't reach by hostname).
  timescaledb-stub:
    image: zot:5000/timescale/timescaledb:latest-pg17
    pull_policy: never
    command: ["sleep", "infinity"]
    labels:
      hmi-update.watch: "true"
      hmi-update.tag-pattern: "^latest-pg17$"
      # Phase 4 plan 04-06 SAFE-01 / SAFE-02 fixture: timescaledb is the
      # canonical "database — no Update / no Rollback" example from
      # PROJECT.md (Container labels reference). safety-labels.spec.ts
      # asserts POST /api/containers/timescaledb-stub/{update,rollback}
      # returns 409 action_disabled_by_label while the cron poller keeps
      # advancing last_polled_at (SAFE-03 carve-out).
      hmi-update.allow-update: "false"
      hmi-update.allow-rollback: "false"
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 3

  # DETECT-08 fixture (invalid-regex branch): a container whose
  # tag-pattern label fails regexp.Compile. The Discoverer's
  # patterns.Set surfaces this via a follow-on StateUpdate that sets
  # Container.Notes to the noteInvalidTagPattern const ("invalid
  # tag-pattern label, ignored"). detect-tag-pattern.spec.ts test 3
  # polls /api/state for that exact Notes string.
  #
  # `[unclosed(` is a syntactically broken regex (unbalanced bracket
  # AND unbalanced paren) — RE2's parser rejects it with a clean
  # error; the Discoverer's permissive-on-error path takes over.
  #
  # IMAGE PROVENANCE
  #   Same zot:5000/... routing as stub-watched-container — required
  #   so the cronPoller's permissive-fallback fetch (CONTEXT.md Area 3:
  #   "invalid regex → no constraint, container still polled against
  #   the bare :latest tag") succeeds against the in-cluster zot. With
  #   DOCKER_UPDATE_REGISTRY_INSECURE=1 set in the base compose, the
  #   resolver flips to plain HTTP globally; pointing at docker.io
  #   would 301 to HTTPS and produce a transient fetch error that
  #   would overwrite the Discoverer's
  #     notes: "invalid tag-pattern label, ignored"
  #   with a registry-error note, breaking
  #   detect-tag-pattern.spec.ts's third assertion.
  invalid-pattern-stub:
    image: zot:5000/centroid-is/stub:latest
    pull_policy: never
    command: ["sleep", "infinity"]
    labels:
      hmi-update.watch: "true"
      hmi-update.tag-pattern: "[unclosed("
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 3

  # DETECT-09 fixture: a digest-pinned container. The Discoverer's
  # parseImageRef detects `image: ...@sha256:...` and sets
  # state.Container.Pinned = true; the cronPoller skips pinned
  # containers; Container.Notes is "pinned: opt-out".
  # detect-pinned.spec.ts asserts both the appears-pinned shape and
  # the never-flips invariant.
  #
  # The sha256 below is the current busybox:latest amd64 digest
  # captured locally at plan-execution time
  # (`docker inspect busybox | jq -r '.[0].RepoDigests[0]'`). If the
  # busybox tag rotates and the digest goes stale, refresh via the
  # same one-liner — the digest is not part of the spec under test,
  # it just needs to be a resolvable busybox digest so docker can
  # actually start the container.
  pinned-stub:
    image: busybox@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    command: ["sleep", "infinity"]
    labels:
      hmi-update.watch: "true"
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 3

  # Phase 5 plan 05-05 ui-flutter-warning.spec.ts fixture (UI-08
  # contract verification). A watched container whose service name
  # contains the substring "weston" so the UI's display-warning
  # predicate (ui/src/lib/display-warning.ts::requiresWarning,
  # case-insensitive substring against ['flutter', 'weston']) fires
  # the pre-action WarningModal before any POST to
  # /api/containers/weston-stub/update.
  #
  # IMAGE PROVENANCE: reuses the pre-seeded zot:5000/centroid-is/stub
  # tag (same as stub-watched-container). Makefile e2e targets already
  # pre-cache busybox:latest under that tag. pull_policy: never blocks
  # the daemon from trying to fetch by hostname (zot:5000 is a
  # compose-internal alias) — matches the offline-resilient pattern
  # used by every other stub in this file. Using alpine:latest here
  # would force a network pull and break the no-network-required
  # invariant that the other stubs enforce.
  #
  # WATCH LABEL: hmi-update.watch=true so the Discoverer surfaces it
  # in /api/state — the UI table needs to list weston-stub for the
  # Playwright spec to click its Update button. The spec asserts the
  # WarningModal fires BEFORE the action POST and on Cancel that NO
  # POST fires (page.route interception with postCount === 0); the
  # Continue path is also exercised (postCount === 1, modal closed).
  # The recreate happy path is not exercised — the Continue assertion
  # only verifies the POST fires; the daemon-DNS gap deferred from
  # Plan 04-07 means the action server-side may not complete, but
  # the modal + intercept contract is what UI-08 pins.
  #
  # OPTIONAL LABEL hmi-update.allow-update=true is intentionally NOT
  # set — the absence-defaults-to-permitted semantic (Phase 4 SAFE-01)
  # is what ships in production; matching that here keeps the e2e
  # fixture true to the operator-visible posture.
  weston-stub:
    image: zot:5000/centroid-is/stub:latest
    pull_policy: never
    command: ["sleep", "infinity"]
    labels:
      hmi-update.watch: "true"
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 3

  # Phase 4 plan 04-06 verify-failed.spec.ts fixture (RESEARCH.md Open
  # Question #2 resolution).
  #
  # A container that exits 1 immediately under restart: unless-stopped. The
  # Phase 4 orchestrator's verify-after-recreate loop (internal/actions/
  # verify.go) observes RestartCount climbing past the pre-action snapshot
  # baseline (=0) and returns *VerifyDetail wrapped in ErrVerifyFailed.
  # Plan 04-04's writeVerifyFailedBody emits the locked structured JSON
  # (CONTEXT.md Area 3 lines 102-112).
  #
  # IMAGE PROVENANCE: reuses the pre-seeded zot:5000/centroid-is/stub
  # tag (same as stub-watched-container) — Makefile's e2e/e2e-cron-fast
  # targets already pre-cache this. pull_policy: never blocks the daemon
  # from trying to fetch by hostname (zot:5000 is a compose-internal alias).
  #
  # WATCH LABEL DECISION: hmi-update.watch=true. The verify-failed spec
  # POSTs to /api/containers/crash-loop-stub/update — that path goes
  # through LookupContainer middleware which reads from the cached
  # Discoverer state. If watch=false, LookupContainer would return 404
  # (misleading) instead of triggering the full Update → verify-failed
  # path that returns 500 verify_failed. The intentional crash-loop
  # generates docker die/start events that the Discoverer tracks
  # (Stopped:true field flips), but those events are confined to this
  # one container and do not affect other detect-*.spec.ts behaviour
  # (those specs target stub-watched-container / timescaledb-stub /
  # invalid-pattern-stub / pinned-stub by name).
  # Phase 9 plan 09-02 e2e/relative-bind-mount.spec.ts fixture (SC-2 b
  # + SC-6 iii). Two watched services with `./test-relative-mount/<NAME>`
  # bind-mounts mirror the EXACT flutter/wayland-socket layout that
  # surfaced the BUG-7 → BUG-7b → BUG-7c → BUG-7d chain (see HANDOFF.md
  # 2026-05-15/16 incident timeline). The bind source path is a repo-
  # relative `./test-relative-mount/A:/data` per RESEARCH.md Pitfall 7
  # — using an absolute path would mask the bug class the test exists
  # to guard against.
  #
  # IMAGE PROVENANCE: reuses the pre-seeded zot:5000/centroid-is/stub
  # tag (same as stub-watched-container) — Makefile e2e* targets already
  # pre-cache busybox:latest under that tag.
  #
  # WATCH LABEL: hmi-update.watch=true so the Discoverer surfaces each
  # service in /api/state — relative-bind-mount.spec.ts POSTs
  # /api/containers/relative-bind-A/update which goes through
  # LookupContainer and would 404 without this label.
  #
  # ALLOW-UPDATE: hmi-update.allow-update=true is the documented
  # default-permitted shape; setting it explicitly here keeps the
  # fixture self-describing.
  #
  # HEALTHCHECK: present so `docker compose up --wait` sees these stubs
  # become healthy and the e2e spec doesn't hang on the bring-up gate.
  #
  # The host-side bind source directories (e2e/test-relative-mount/A/,
  # /B/) are committed with .gitkeep so compose has a real directory to
  # mount; an absent source path makes docker create an empty dir at
  # compose-up time which would mask the relative-path bug entirely.
  relative-bind-A:
    image: zot:5000/centroid-is/stub:latest
    pull_policy: never
    command: ["sh", "-c", "sleep infinity"]
    restart: unless-stopped
    volumes:
      - ./test-relative-mount/A:/data
    labels:
      hmi-update.watch: "true"
      hmi-update.allow-update: "true"
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 3

  relative-bind-B:
    image: zot:5000/centroid-is/stub:latest
    pull_policy: never
    command: ["sh", "-c", "sleep infinity"]
    restart: unless-stopped
    volumes:
      - ./test-relative-mount/B:/data
    labels:
      hmi-update.watch: "true"
      hmi-update.allow-update: "true"
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 3

  crash-loop-stub:
    image: zot:5000/centroid-is/stub:latest
    pull_policy: never
    # The 2-second sleep before exit gives `docker compose up --wait` a
    # window in which the container is observably "running", so the
    # initial stack boot doesn't hang forever waiting on a never-running
    # service. After the first cycle the container is in a crash loop
    # (sh exits 1 → unless-stopped policy restarts → sh runs the same
    # command → exits 1 again …). The verify-failed.spec.ts then POSTs
    # /api/containers/crash-loop-stub/update, which recreates the
    # container; the recreated container immediately enters the same
    # cycle, RestartCount climbs past 0 within the 15-second verify
    # window, and verify-after-recreate (internal/actions/verify.go)
    # returns ErrVerifyFailed. The 2-second pre-exit is irrelevant to
    # the verify-failed flow because the orchestrator's snapshot
    # captures RestartCount=0 at recreate time; any subsequent
    # increment is the failure signal.
    command: ["sh", "-c", "sleep 2 && exit 1"]
    restart: unless-stopped
    labels:
      hmi-update.watch: "true"

  # NOTE: docker-update intentionally has NO compose-side healthcheck.
  # The runtime image (gcr.io/distroless/static-debian12:nonroot) lacks
  # wget, curl, and any shell, so there's nothing to drive a probe with.
  # e2e/global-setup.ts polls http://localhost:8080/healthz from the host
  # after `docker compose up -d --wait` returns; that is the gate we use
  # to know docker-update is serving. Phase 7 may revisit by either baking a
  # --healthcheck flag into the binary or switching to cc-debian12.
  docker-update:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    # macOS Docker Desktop + Linux dual support. The container's effective
    # UID stays at 65532 (distroless nonroot reserved). The GID is overridden
    # at compose-up time from HMI_DOCKER_GID, which the Makefile derives from
    # `stat`-ing /var/run/docker.sock on the host (see Makefile `e2e` target).
    # Fallback to 65532 keeps explicit failure visible when the env var is
    # unset: /healthz will return 503 EACCES with the Pitfall 9 hint, the
    # same way the compose.test.override.eacces.yml override does
    # deliberately. Override files that pin a literal user: (e.g.
    # compose.test.override.eacces.yml's "65532:65532") bypass this base
    # entry — compose v2 scalar-merge replaces the whole string.
    user: "65532:${HMI_DOCKER_GID:-65532}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./compose.test.yml:/host/docker-compose.yml:ro
      # Plan 07-01 follow-up: the production Dockerfile no longer bakes the
      # docker CLI into the image (Option A per 07-CONTEXT.md §2.3 — host
      # binary bind-mount keeps the image <30 MB). compose.Runner shells out
      # to `docker compose up -d --force-recreate <svc>` which requires the
      # binary + compose plugin on PATH inside the container. Match the
      # production docker-compose.example.yml.
      #
      # macOS portability (Phase 7 REVIEW WR-05): on Docker Desktop the
      # host filesystem does NOT have /usr/libexec/docker/cli-plugins (the
      # path lives inside the LinuxKit VM, not on the macOS host). Linux
      # CI inherits the defaults below — no change for ubuntu-24.04 runs.
      # macOS developers running `make e2e` locally can either (a) export
      # HMI_DOCKER_BIN / HMI_DOCKER_CLI_PLUGINS to point at host paths
      # that DO exist on their machine, or (b) accept that the actions
      # tests will fail with "no such file" inside the container and skip
      # them — the digest-poll and UI specs still exercise the binary.
      - ${HMI_DOCKER_BIN:-/usr/bin/docker}:/usr/bin/docker:ro
      - ${HMI_DOCKER_CLI_PLUGINS:-/usr/libexec/docker/cli-plugins}:/usr/libexec/docker/cli-plugins:ro
    tmpfs:
      # tmpfs (not a named volume) for the state dir so the nonroot UID
      # 65532 can write to it. Named volumes inherit root ownership on
      # first create and there's no shell in distroless to chown them.
      # tmpfs sizes/mounts are owned by the container user from the start.
      # Phase 1 tests don't need state durability between runs (teardown
      # wipes everything); Phase 7 may revisit when production durability
      # is in scope.
      - /state:uid=65532,gid=65532,mode=0755
    environment:
      - DOCKER_UPDATE_STATE_PATH=/state/docker_update_state.json
      - DOCKER_UPDATE_LOG_LEVEL=info
      # DOCKER_UPDATE_COMPOSE_PATH — Phase 2 (DOCK-02). main.go's
      # compose.NewReader call log.Fatalf's on empty path; the bind-mount
      # below provides the file at /host/docker-compose.yml.
      - DOCKER_UPDATE_COMPOSE_PATH=/host/docker-compose.yml
      # Plan 03-05 e2e knob: zot listens on plain HTTP at zot:5000 in
      # the compose network. internal/registry.NewResolver reads this
      # env var at boot and adds crane.Insecure to every Digest call
      # when it is set. Production docker-update deployments MUST leave
      # this variable unset so HTTPS is enforced against the real
      # registries (ghcr.io, Docker Hub). See resolver.go godoc.
      - DOCKER_UPDATE_REGISTRY_INSECURE=1
    depends_on:
      # service_started (not service_healthy) because zot has no
      # compose-side healthcheck — see the note on the zot service above.
      # global-setup.ts polls /v2/ from the host before any test runs, so
      # the readiness gate is preserved at a different layer.
      zot:
        condition: service_started
      stub-watched-container:
        condition: service_started
      # Plan 03-05 fixtures (DETECT-08 + DETECT-09). All three new
      # containers must be visible to docker-update's Discoverer at
      # boot, so they're hard depends_on entries here.
      timescaledb-stub:
        condition: service_started
      invalid-pattern-stub:
        condition: service_started
      pinned-stub:
        condition: service_started
      # Phase 5 plan 05-05 ui-flutter-warning.spec.ts fixture. weston-stub
      # is a plain `sleep infinity` container with a `weston`-substring
      # name; it must be enumerated by the Discoverer at boot so the
      # UI lists it for the Playwright spec to click. service_started
      # mirrors the other stubs (no compose-side healthcheck dependency).
      weston-stub:
        condition: service_started
      # Phase 9 plan 09-02 relative-bind-mount.spec.ts fixtures. Both
      # services must be enumerated by the Discoverer at boot so the
      # spec can POST /api/containers/relative-bind-{A,B}/update.
      # service_started suffices (no healthcheck dependency needed —
      # the stubs run `sleep infinity` and are observably running
      # within the compose up window).
      relative-bind-A:
        condition: service_started
      relative-bind-B:
        condition: service_started
      # Phase 4 plan 04-06 verify-failed.spec.ts fixture.
      #
      # NOTE: crash-loop-stub is NOT listed here. The container exits 1 under
      # `restart: unless-stopped`, so it oscillates between "Started" and
      # "Restarting"; `docker compose up --wait` requires a steady "running"
      # state which the crash-loop never reaches. Listing it here would hang
      # `up --wait` forever (Rule 3 blocking bug surfaced on rerun after the
      # initial 04-06 run when the daemon's restart cadence happened to
      # land outside the --wait poll window).
      #
      # Removing the depends_on does NOT remove the container from the
      # /api/state cache: the Discoverer subscribes to docker events at boot
      # (DOCK-04 events path; proven by discovery.spec.ts::'events path:
      # docker-spawned labeled container visible within 5s'). When the
      # daemon emits the first "start" event for crash-loop-stub, the
      # Discoverer adds it to state. verify-failed.spec.ts begins with
      # `await waitForContainer(request, 'crash-loop-stub', 60_000)` to
      # absorb any small lag between docker-update's HTTP server coming up
      # and the events-path enumeration. No depends_on needed.

# No named volumes needed: docker-update writes its state into a tmpfs
# (see above) which is wiped along with the container on `docker compose
# down`. The Phase 7 production deployment will bind-mount a host path
# instead per DEPLOY-04.
