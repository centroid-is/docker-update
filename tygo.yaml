packages:
  - path: "github.com/centroid-is/docker-update/internal/api"
    output_path: "ui/src/lib/types.d.ts"
    indent: "  "
    # Only generate TS types from types.go — server.go/handlers.go/static.go
    # define HTTP plumbing whose Go-exported types must NOT leak into the
    # wire-types file the UI consumes.
    include_files:
      - "types.go"
    type_mappings:
      time.Time: "string /* RFC3339 */"
    frontmatter: |
      // This file is generated by tygo from internal/api/types.go.
      // Do not edit by hand. Run `make types` to regenerate.
